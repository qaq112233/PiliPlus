# .github/workflows/build-windows.yml

name: Build PiliPlus for Windows

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

# 设置默认环境变量
env:
  # 指定 vcpkg 的目标平台为 64位 Windows
  VCPKG_DEFAULT_TRIPLET: x64-windows

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 步骤 1: 检出你的代码 (包括刚刚添加的 vcpkg.json)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步骤 2: 运行 vcpkg
      # 它会自动找到 vcpkg.json 并安装所有依赖
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        # 注意：这里不再需要 with: vcpkgTriplet 了

      # 步骤 3: 配置 CMake
      # -DCMAKE_TOOLCHAIN_FILE 会由 run-vcpkg 自动设置好
      - name: Configure CMake
        run: cmake -B build -S .

      # 步骤 4: 构建项目
      - name: Build project
        run: cmake --build build --config Release

      # 步骤 5: 打包可执行文件和所需的 DLL
      - name: Package artifacts
        shell: pwsh
        run: |
          mkdir release
          cp build/Release/PiliPlus.exe ./release/
          Get-VcpkgDLLs -dest ./release/ -buildDir ./build/

      # 步骤 6: 上传构建产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PiliPlus-Windows
          path: release/
